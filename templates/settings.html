<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10B981">
    <title>设置 - Zs服药提醒</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <span class="icon">💊</span>
            <span>Zs服药提醒</span>
        </div>
        <div class="user-menu">
            <a href="/" style="color:white;">返回</a>
        </div>
    </header>

    <div class="container" style="padding-bottom: 80px;">
        <div class="page-title">⚙️ 设置</div>

        <!-- 推送通知 -->
        <div class="card">
            <div class="card-header">🔔 推送通知</div>
            <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
                开启后，即使关闭页面也能收到服药提醒
            </div>

            <div class="reminder-item">
                <div class="rem-info">
                    <div>
                        <div style="font-weight: 600;">浏览器推送</div>
                        <div style="font-size: 12px; color: var(--text-secondary);" id="pushStatusText">检查中...</div>
                    </div>
                </div>
                <button class="btn btn-sm btn-primary" onclick="subscribePush()" id="pushBtn">
                    开启推送
                </button>
            </div>

            <button class="btn btn-outline btn-sm btn-block" onclick="testPush()" style="margin-top: 12px;">
                🔔 发送测试推送
            </button>
        </div>

        <!-- 提醒偏好 -->
        <div class="card">
            <div class="card-header">📋 提醒偏好</div>

            <div class="form-group">
                <label class="form-label">药品过期提前提醒天数</label>
                <select id="expiry_warn_days" class="form-input">
                    <option value="7" {% if expiry_warn_days == 7 %}selected{% endif %}>7 天前</option>
                    <option value="14" {% if expiry_warn_days == 14 %}selected{% endif %}>14 天前</option>
                    <option value="30" {% if expiry_warn_days == 30 %}selected{% endif %}>30 天前（默认）</option>
                    <option value="60" {% if expiry_warn_days == 60 %}selected{% endif %}>60 天前</option>
                </select>
            </div>

            <button class="btn btn-primary btn-sm btn-block" onclick="savePreferences()" style="margin-top: 8px;">
                💾 保存偏好
            </button>
        </div>

        <!-- 账号管理 -->
        <div class="card">
            <div class="card-header">👤 账号管理</div>

            <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
                数据存储在云端 Supabase，换设备登录即可同步
            </div>

            <button class="btn btn-outline btn-sm" onclick="handleLogout()" style="width: 100%; margin-bottom: 8px;">
                🚪 退出登录
            </button>
        </div>

        <!-- 关于 -->
        <div class="card" style="text-align: center;">
            <div style="font-size: 28px; margin-bottom: 8px;">💊</div>
            <div style="font-weight: 600;">Zs服药提醒智能体</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                v2.1 · Supabase · AI 智能识别
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/">
            <span class="nav-icon">🏠</span>
            <span>今日</span>
        </a>
        <a href="/medicines">
            <span class="nav-icon">💊</span>
            <span>药品</span>
        </a>
        <a href="/history">
            <span class="nav-icon">📊</span>
            <span>记录</span>
        </a>
        <a href="/settings" class="active">
            <span class="nav-icon">⚙️</span>
            <span>设置</span>
        </a>
    </nav>

    <div id="toast" class="toast"></div>

    <script>
        // API 调用
        async function api(url, options = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json', ...options.headers },
                ...options,
            });
            if (res.status === 401) { window.location.href = '/login'; return null; }
            if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || '请求失败'); }
            return await res.json();
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        }

        // 推送订阅
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
            return outputArray;
        }

        async function subscribePush() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                showToast('您的浏览器不支持推送通知', 'error');
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                showToast('需要允许通知权限才能接收推送', 'error');
                return;
            }

            try {
                const registration = await navigator.serviceWorker.ready;
                const vapidResp = await fetch('/api/push/vapid-public-key');
                const vapidData = await vapidResp.json();
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(vapidData.publicKey),
                });
                const subData = subscription.toJSON();
                await fetch('/api/push/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endpoint: subData.endpoint, keys: subData.keys }),
                });
                document.getElementById('pushStatusText').textContent = '已开启';
                document.getElementById('pushBtn').textContent = '重新订阅';
                showToast('推送通知已开启！');
            } catch (e) {
                showToast('订阅推送失败', 'error');
            }
        }

        async function testPush() {
            try {
                const resp = await fetch('/api/push/test', { method: 'POST' });
                const result = await resp.json();
                if (result.success > 0) showToast('测试推送已发送！');
                else showToast('请先开启推送通知', 'error');
            } catch (e) {
                showToast('发送失败', 'error');
            }
        }

        async function savePreferences() {
            const days = parseInt(document.getElementById('expiry_warn_days').value);
            try {
                await api('/api/settings', {
                    method: 'PUT',
                    body: JSON.stringify({ push_enabled: true, expiry_warn_days: days }),
                });
                showToast('偏好已保存');
            } catch (e) {}
        }

        async function handleLogout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // 页面加载时检查推送状态
        document.addEventListener('DOMContentLoaded', async () => {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    const subscription = await registration.pushManager.getSubscription();
                    if (subscription) {
                        document.getElementById('pushStatusText').textContent = '已开启';
                        document.getElementById('pushBtn').textContent = '重新订阅';
                    } else {
                        document.getElementById('pushStatusText').textContent = '未开启';
                    }
                } catch (e) {
                    document.getElementById('pushStatusText').textContent = '暂不可用';
                }
            } else {
                document.getElementById('pushStatusText').textContent = '浏览器不支持';
                document.getElementById('pushBtn').disabled = true;
            }
        });
    </script>
</body>
</html>
