name: MediReminder - Send Reminders
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.APP_BASE_URL }}/api/cron/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
