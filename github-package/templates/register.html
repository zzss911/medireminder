<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10B981">
    <title>注册 - Zs服药提醒</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💊</div>
        <div class="auth-title">创建账号</div>
        <div class="auth-subtitle">开始智能服药管理之旅</div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="name">昵称</label>
                <input type="text" id="name" class="form-input" placeholder="请输入您的昵称" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">邮箱</label>
                <input type="email" id="email" class="form-input" placeholder="请输入邮箱地址" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" class="form-input" placeholder="至少6位密码" required autocomplete="new-password" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">注册</button>
        </form>

        <div class="auth-link">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/static/js/app.js"></script>
</body>
</html>
